<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빨모쌤 영어학습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1826;
  --surface2: #242035;
  --border: #2e2a45;
  --accent: #e8c547;
  --accent2: #7c6af7;
  --accent3: #f76a6a;
  --text: #e8e6f0;
  --text-muted: #7b7895;
  --text-dim: #4a4768;
  --success: #4caf80;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background decoration */
body::before {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* HEADER */
.header {
  padding: 24px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(15,14,23,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.logo span { color: var(--text-muted); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; margin-left: 10px; font-weight: 300; }
.revision { color: var(--text-dim); font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-left: 10px; }

.episode-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.episode-badge:hover { border-color: var(--accent2); color: var(--text); }

/* EPISODE SELECTOR */
.episode-selector {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s;
}
.episode-selector.active { display: flex; align-items: center; justify-content: center; }
.episode-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  width: 380px;
  max-width: 90vw;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
}
#episodeList {
  overflow-y: auto;
  flex: 1;
}
.episode-panel h3 {
  font-size: 16px; font-weight: 500; margin-bottom: 16px;
  color: var(--text-muted);
}
.ep-item {
  padding: 12px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 14px;
  margin-bottom: 4px;
  border: 1px solid transparent;
}
.ep-item:hover { background: var(--surface2); border-color: var(--border); }
.ep-item.active { background: var(--surface2); border-color: var(--accent2); color: var(--accent); }
.ep-item .ep-count { color: var(--text-muted); font-size: 12px; margin-left: 8px; }

/* MAIN CONTENT */
.main { max-width: 820px; margin: 0 auto; padding: 32px 20px; }

/* NAV TABS */
.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 4px;
  margin-bottom: 36px;
}
.tab-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 13px;
  border-radius: 46px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  background: var(--accent);
  color: var(--bg);
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(232,197,71,0.3);
}
.tab-btn .icon { font-size: 15px; }

/* SECTION */
.section { display: none; }
.section.active { display: block; animation: slideUp 0.3s ease; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ========== FLASHCARD ========== */
.flashcard-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.card-counter {
  font-size: 13px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.card-scene {
  width: 100%;
  max-width: 560px;
  height: 360px;
  perspective: 1000px;
  cursor: pointer;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
}
.card-scene.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px;
  border: 1px solid var(--border);
  text-align: center;
}
.card-front {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
}
.card-back {
  background: linear-gradient(135deg, #1e1b35 0%, #251f3a 100%);
  transform: rotateY(180deg);
  border-color: var(--accent2);
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: var(--text-muted);
  padding: 5px 7px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 0;
  z-index: 10;
  display: flex;
  align-items: center;
}
.copy-btn:hover { background: rgba(255,255,255,0.15); color: var(--text); }
.copy-toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(30,27,53,0.95);
  color: #4ade80;
  border: 1px solid #4ade80;
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 9999;
}
.copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.card-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}
.card-korean {
  font-size: 22px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 8px;
}
.card-hint {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 12px;
}
.card-vocab-front {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.8;
  font-family: 'JetBrains Mono', monospace;
  opacity: 0.75;
}
.card-english {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--accent);
  line-height: 1.5;
  margin-bottom: 12px;
}
.card-vocab {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.8;
  font-family: 'JetBrains Mono', monospace;
}
.card-vocab span { color: var(--accent2); }

.card-controls {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.ctrl-btn {
  padding: 10px 24px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 50px;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.ctrl-btn:hover { background: var(--surface2); border-color: var(--accent2); }
.ctrl-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
.ctrl-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }
.ctrl-btn.danger { border-color: var(--accent3); color: var(--accent3); }
.ctrl-btn.danger:hover { background: rgba(247,106,106,0.1); }
.ctrl-btn.success-btn { border-color: var(--success); color: var(--success); }
.ctrl-btn.success-btn:hover { background: rgba(76,175,128,0.1); }

.progress-bar-wrap {
  width: 100%;
  max-width: 560px;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ========== QUIZ ========== */
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  max-width: 640px;
  margin: 0 auto;
}
.quiz-q-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
  font-family: 'JetBrains Mono', monospace;
}
.quiz-question {
  font-size: 19px;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 28px;
  font-weight: 400;
}
.quiz-question em {
  color: var(--accent);
  font-style: normal;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.quiz-opt {
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent2); background: rgba(124,106,247,0.08); }
.quiz-opt.correct { border-color: var(--success); background: rgba(76,175,128,0.12); color: var(--success); }
.quiz-opt.wrong { border-color: var(--accent3); background: rgba(247,106,106,0.1); color: var(--accent3); }
.quiz-opt:disabled { cursor: default; }

.quiz-feedback {
  font-size: 14px;
  padding: 12px 16px;
  border-radius: 10px;
  display: none;
  margin-bottom: 16px;
  line-height: 1.6;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(76,175,128,0.1); border: 1px solid rgba(76,175,128,0.3); color: var(--success); }
.quiz-feedback.wrong-fb { background: rgba(247,106,106,0.08); border: 1px solid rgba(247,106,106,0.25); color: #f76a6a; }

.score-display {
  text-align: center;
  padding: 8px 0 16px;
  font-size: 13px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}
.score-display span { color: var(--accent); font-size: 18px; }

/* ========== FILL IN THE BLANK ========== */
.fill-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  max-width: 640px;
  margin: 0 auto;
}
.fill-sentence {
  font-size: 20px;
  line-height: 1.7;
  color: var(--text);
  margin: 16px 0 24px;
  font-family: 'Playfair Display', serif;
}
.fill-blank {
  display: inline-block;
  border-bottom: 2px solid var(--accent);
  min-width: 120px;
  padding: 0 4px;
  color: var(--accent);
  vertical-align: bottom;
}
.fill-input-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.fill-input {
  flex: 1;
  min-width: 180px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.fill-input:focus { border-color: var(--accent2); }
.fill-input.correct-input { border-color: var(--success); }
.fill-input.wrong-input { border-color: var(--accent3); }

.fill-hint {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
  font-family: 'JetBrains Mono', monospace;
}
.fill-hint em { color: var(--accent2); font-style: normal; }

.fill-feedback {
  display: none;
  font-size: 14px;
  line-height: 1.6;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 16px;
}
.fill-feedback.show { display: block; }
.fill-feedback.ok { background: rgba(76,175,128,0.1); border: 1px solid rgba(76,175,128,0.3); color: var(--success); }
.fill-feedback.ng { background: rgba(247,106,106,0.08); border: 1px solid rgba(247,106,106,0.25); color: #f76a6a; }
.fill-feedback .correct-ans { color: var(--accent); font-weight: 600; }

/* ========== CONVERSATION ========== */
.conv-area {
  max-width: 640px;
  margin: 0 auto;
}
.conv-situation {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.conv-icon { font-size: 24px; }
.conv-situation-text { font-size: 14px; color: var(--text-muted); line-height: 1.65; }
.conv-situation-text strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

.conv-messages {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 200px;
  max-height: 380px;
  overflow-y: auto;
  padding: 4px 0 12px;
  margin-bottom: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.msg {
  display: flex;
  gap: 10px;
  animation: msgIn 0.25s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.msg.ai .msg-avatar { background: rgba(124,106,247,0.15); border-color: var(--accent2); }
.msg-bubble {
  max-width: 72%;
  padding: 11px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.65;
}
.msg.ai .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: rgba(232,197,71,0.12);
  border: 1px solid rgba(232,197,71,0.2);
  border-bottom-right-radius: 4px;
  color: var(--text);
}
.msg-bubble .korean { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.msg-bubble .tip {
  font-size: 12px; color: var(--accent2);
  background: rgba(124,106,247,0.08);
  border-radius: 6px;
  padding: 6px 10px;
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
}
.typing-indicator {
  display: none;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
}
.typing-indicator.show { display: flex; }
.dot { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

/* CONV 음성 버튼 */
.conv-mic-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.conv-mic-btn:hover { border-color: var(--accent2); color: var(--text); }
.conv-mic-btn.listening {
  background: var(--accent3);
  border-color: var(--accent3);
  color: #fff;
  animation: pulse-ring 1s ease infinite;
}
.conv-mic-btn.disabled { opacity: 0.3; cursor: default; }
.conv-input {
  flex: 1;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
}
.conv-input:focus { border-color: var(--accent2); }
.send-btn {
  padding: 12px 20px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.send-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

.conv-suggestions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.api-key-row {
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 10px;
  font-size: 13px;
}
.api-key-row.hidden { display: none; }
.api-key-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.api-key-input::placeholder { color: var(--text-dim); }
.sugg-btn {
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.sugg-btn:hover { border-color: var(--accent2); color: var(--text); }

/* EMPTY / LOADING */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 14px;
}
.empty .icon { font-size: 40px; margin-bottom: 12px; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* AUDIO */
.audio-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 8px 18px;
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 50px;
  color: var(--accent);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.audio-btn:hover { background: rgba(232,197,71,0.1); transform: translateY(-1px); }
.audio-btn.playing {
  background: var(--accent);
  color: var(--bg);
  animation: pulse-ring 1.2s ease infinite;
}
.audio-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(232,197,71,0.4); }
  70%  { box-shadow: 0 0 0 8px rgba(232,197,71,0); }
  100% { box-shadow: 0 0 0 0 rgba(232,197,71,0); }
}
.audio-auto-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 8px;
}
.audio-toggle {
  position: relative; width: 36px; height: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: background 0.2s;
}
.audio-toggle.on { background: var(--accent); border-color: var(--accent); }
.audio-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; background: var(--text-muted);
  border-radius: 50%; transition: all 0.2s;
}
.audio-toggle.on::after { left: 18px; background: var(--bg); }

/* ── 콘텐츠 전환 탭 ── */
.content-tabs-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px 2px;
  background: var(--bg);
}
.content-tab {
  padding: 6px 20px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.content-tab:hover { border-color: var(--accent); color: var(--text); }
.content-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: 600;
}

<body>

<header class="header">
  <div class="logo">빨모쌤 <span>English Lab</span><span class="revision">rev.2026.04.20</span></div>
  <button class="episode-badge" onclick="toggleEpisodeSelector()">📚 에피소드 선택 ▾</button>
</header>
<div class="content-tabs-bar">
  <button class="content-tab active" data-key="ppalmmo" onclick="switchContent('ppalmmo')">빨모쌤</button>
  <button class="content-tab" data-key="office" onclick="switchContent('office')">직장 영어</button>
</div>

<!-- Episode Selector Overlay -->
<div class="episode-selector" id="episodeSelector" onclick="closeEpisodeSelector(event)">
  <div class="episode-panel">
    <h3>📚 에피소드 선택</h3>
    <div id="episodeList"></div>
    <div style="margin-top:14px; text-align:right;">
      <button class="ctrl-btn" onclick="toggleEpisodeSelector()">닫기</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- Tabs -->
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('flashcard', this)"><span class="icon">🃏</span>플래시카드</button>
    <button class="tab-btn" onclick="switchTab('quiz', this)"><span class="icon">🎯</span>퀴즈</button>
    <button class="tab-btn" onclick="switchTab('fill', this)"><span class="icon">✏️</span>빈칸채우기</button>
    <button class="tab-btn" onclick="switchTab('conv', this)"><span class="icon">💬</span>대화연습</button>
  </div>

  <!-- FLASHCARD -->
  <div id="flashcard" class="section active">
    <div class="flashcard-area">
      <div class="card-counter" id="fcCounter">0 / 0</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="fcProgress" style="width:0%"></div>
      </div>
      <div class="card-scene" id="cardScene" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
          <div class="card-face card-front" id="cardFront">
            <div class="card-label">한국어 → 영어</div>
            <div class="card-korean" id="fcKorean">에피소드를 선택해주세요</div>
            <div class="card-vocab card-vocab-front" id="fcVocabFront"></div>
            <div class="card-hint" id="fcHint">클릭하면 영어 문장이 나타납니다</div>
          </div>
          <div class="card-face card-back" id="cardBack">
            <button class="copy-btn" id="copyBtn" onclick="copyEnglish(event)" title="문장 복사">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <div class="card-label">English</div>
            <div class="card-english" id="fcEnglish"></div>
            <div class="card-vocab" id="fcVocab"></div>
          </div>
        </div>
      </div>
      <div class="card-controls" id="fcControls" style="visibility:hidden">
        <button class="ctrl-btn danger" onclick="fcFeedback(false)">😓 다시 볼게요</button>
        <button class="ctrl-btn success-btn" onclick="fcFeedback(true)">✅ 알았어요!</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:4px 0;flex-wrap:wrap;justify-content:center;">
        <button class="audio-btn" id="fcAudioBtn" onclick="playCardAudio()">🔊 듣기</button>
        <div class="audio-auto-row">
          <div class="audio-toggle" id="autoPlayToggle" onclick="toggleAutoPlay()"></div>
          <span>카드 뒤집을 때 자동재생</span>
        </div>
      </div>
      <div class="card-controls">
        <button class="ctrl-btn" onclick="fcPrev()">← 이전</button>
        <button class="ctrl-btn primary" onclick="shuffleFlashcards()">🔀 섞기</button>
        <button class="ctrl-btn" onclick="fcNext()">다음 →</button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="section">
    <div class="score-display">점수: <span id="quizScore">0</span> / <span id="quizTotal">0</span></div>
    <div class="quiz-card" id="quizCard">
      <div class="empty"><div class="icon">🎯</div>에피소드를 선택하면 퀴즈가 시작됩니다</div>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="ctrl-btn primary" onclick="startQuiz()">🎲 새 퀴즈</button>
    </div>
  </div>

  <!-- FILL IN THE BLANK -->
  <div id="fill" class="section">
    <div class="fill-card" id="fillCard">
      <div class="empty"><div class="icon">✏️</div>에피소드를 선택하면 문제가 나타납니다</div>
    </div>
  </div>

  <!-- CONVERSATION -->
  <div id="conv" class="section">
    <div class="conv-area">
      <div class="api-key-row hidden" id="apiKeyRow">
        <span>🔑</span>
        <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Anthropic API 키 입력 (sk-ant-...)">
        <button class="ctrl-btn primary" onclick="saveApiKey()">저장</button>
      </div>
      <div class="conv-situation" id="convSituation">
        <div class="conv-icon">💬</div>
        <div class="conv-situation-text">
          <strong>대화 연습 모드</strong>
          에피소드를 선택하면 해당 주제로 AI와 영어 대화를 연습할 수 있습니다. AI가 상황을 설정하고 여러분의 영어 표현을 코멘트해드립니다.
        </div>
      </div>
      <div class="conv-messages" id="convMessages"></div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span style="font-size:12px;color:var(--text-muted);margin-left:6px">AI가 답변 중...</span>
      </div>
      <div class="conv-suggestions" id="convSuggestions"></div>
      <div class="conv-input-row">
        <button class="conv-mic-btn" id="convMicBtn" onclick="toggleConvMic()" title="음성으로 말하기">🎤</button>
        <input class="conv-input" id="convInput" type="text" placeholder="영어로 말하거나 입력하세요..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">전송</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function parseContent(raw) {
  const episodes = [];
  const lines = raw.split('\n');
  let currentEp = null;
  let i = 0;

  while (i < lines.length) {
    const line = lines[i].trim();
    if (line.startsWith('Episode:')) {
      if (currentEp) episodes.push(currentEp);
      currentEp = {
        title: line.replace('Episode:', '').trim(),
        topic: '',
        sentences: [],   // 예문 + 대화문 모두 포함 (isDialogue 플래그로 구분)
        dialogues: []    // 대화 그룹 (대화 탭용)
      };
    } else if (line.startsWith('주제:') && currentEp) {
      currentEp.topic = line.replace('주제:', '').trim();
    } else if (line === '{' && currentEp) {
      // dialogue block — sentences에도 추가, dialogues에도 그룹으로 추가
      const dialogue = [];
      i++;
      while (i < lines.length && lines[i].trim() !== '}') {
        const dl = lines[i].trim();
        if (dl && !dl.startsWith('*')) {
          const ni = i + 1;
          if (ni < lines.length) {
            const nextLine = lines[ni].trim();
            if (nextLine && !nextLine.startsWith('*') && nextLine !== '}') {
              const idMatch = nextLine.match(/\[ep(\d{2})_(\d{3})\]/);
              const audioId = idMatch ? `ep${idMatch[1]}_${idMatch[2]}` : null;
              const englishClean = nextLine.replace(/\s*\[ep\d{2}_\d{3}\]/, '').trim();
              const entry = { korean: dl, english: englishClean, vocab: [], audioId: audioId, isDialogue: true };
              currentEp.sentences.push(entry);
              dialogue.push(entry);
              i = ni;
            }
          }
        }
        i++;
      }
      if (dialogue.length) currentEp.dialogues.push(dialogue);
    } else if (line && !line.startsWith('*') && !line.startsWith('출처') && !line.startsWith('id:') && currentEp) {
      // 예문 라인
      const nextIdx = i + 1;
      if (nextIdx < lines.length) {
        const nextLine = lines[nextIdx].trim();
        if (nextLine && !nextLine.startsWith('*') && nextLine !== '{' && nextLine !== '}' && !nextLine.startsWith('Episode:') && !nextLine.startsWith('주제:')) {
          // collect vocab
          const vocab = [];
          let vi = nextIdx + 1;
          while (vi < lines.length && lines[vi].trim().startsWith('*')) {
            vocab.push(lines[vi].trim().replace(/^\*+\s*/, ''));
            vi++;
          }
          const idMatch = nextLine.match(/\[ep(\d{2})_(\d{3})\]/);
          const audioId = idMatch ? `ep${idMatch[1]}_${idMatch[2]}` : null;
          const englishClean = nextLine.replace(/\s*\[ep\d{2}_\d{3}\]/, '').trim();
          currentEp.sentences.push({
            korean: line,
            english: englishClean,
            vocab: vocab,
            audioId: audioId,
            isDialogue: false
          });
          i = vi - 1;
        }
      }
    }
    i++;
  }
  if (currentEp) episodes.push(currentEp);
  return episodes;
}

// ── 콘텐츠 세트 ──────────────────────────────────────────────
const CONTENT_SETS = {
  ppalmmo: {
    label: '빨모쌤',
    raw: RAW,
    prefix: 'ppalmmo_',
    episodes: null,   // init 시 채움
  },
  office: {
    label: '직장 영어',
    raw: RAW_OFFICE,
    prefix: 'office_english_',
    episodes: null,
  },
};
CONTENT_SETS.ppalmmo.episodes = parseContent(CONTENT_SETS.ppalmmo.raw);
CONTENT_SETS.office.episodes  = parseContent(CONTENT_SETS.office.raw);

let currentContentKey = 'ppalmmo';
let currentEpIdx = 0;

function currentContent() { return CONTENT_SETS[currentContentKey]; }
function currentEpisodes() { return currentContent().episodes; }

// FLASHCARD STATE
let fcCards = [];
let fcIdx = 0;
let fcFlipped = false;

// QUIZ STATE
let quizItems = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;

// FILL STATE
let fillItems = [];
let fillIdx = 0;

// CONV STATE
let convHistory = [];

function getCurrentSentences() {
  const eps = currentEpisodes();
  if (currentEpIdx === -1) return eps.flatMap(ep => ep.sentences);
  return eps[currentEpIdx].sentences;
}

// ============================================================
//  AUDIO ENGINE
// ============================================================
const AUDIO_BASE = 'audio/';

let currentAudio = null;
let autoPlayEnabled = false;

function getAudioPath(audioId) {
  if (!audioId) return null;
  return `${AUDIO_BASE}${currentContent().prefix}${audioId}.mp3`;
}

function playAudio(audioId, btnEl) {
  if (!audioId) {
    showToast('⚠️ 이 문장은 오디오가 없습니다');
    return;
  }
  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('playing'));
    if (btnEl) { btnEl.textContent = '🔊 듣기'; return; }
  }
  const path = getAudioPath(audioId);
  currentAudio = new Audio(path);
  if (btnEl) {
    btnEl.classList.add('playing');
    btnEl.textContent = '⏹ 정지';
  }
  currentAudio.play().catch(() => {
    showToast('⚠️ 오디오 파일을 찾을 수 없습니다 (' + path + ')');
    if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '🔊 듣기'; }
  });
  currentAudio.onended = () => {
    if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '🔊 듣기'; }
  };
}

function playCardAudio() {
  if (!fcCards.length) return;
  const card = fcCards[fcIdx];
  const btn = document.getElementById('fcAudioBtn');
  playAudio(card.audioId, btn);
}

function copyEnglish(e) {
  e.stopPropagation();
  const text = document.getElementById('fcEnglish').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

function toggleAutoPlay() {
  autoPlayEnabled = !autoPlayEnabled;
  const toggle = document.getElementById('autoPlayToggle');
  if (toggle) toggle.classList.toggle('on', autoPlayEnabled);
  showToast(autoPlayEnabled ? '🔊 자동재생 켜짐' : '🔇 자동재생 꺼짐');
}

// ============================================================
//  API KEY
// ============================================================
function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || '';
}

function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) return;
  localStorage.setItem('anthropic_api_key', val);
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('apiKeyRow').classList.add('hidden');
  showToast('🔑 API 키가 저장됐습니다');
}

function showApiKeyRow() {
  const row = document.getElementById('apiKeyRow');
  row.classList.remove('hidden');
  document.getElementById('apiKeyInput').focus();
}

// ============================================================
//  INIT
// ============================================================
function switchContent(key) {
  if (key === currentContentKey) return;
  currentContentKey = key;
  currentEpIdx = 0;
  document.querySelectorAll('.content-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.key === key);
  });
  renderEpisodeList();
  selectEpisode(0);
}

function init() {
  const eps = currentEpisodes();
  if (eps.length === 0) {
    console.error('[빨모쌤] parseContent 실패');
    document.getElementById('fcKorean').textContent = '로드 오류 - 콘솔 확인';
    return;
  }
  renderEpisodeList();
  selectEpisode(0);
}

function renderEpisodeList() {
  const eps = currentEpisodes();
  const list = document.getElementById('episodeList');
  const totalSents = eps.reduce((n, ep) => n + ep.sentences.length, 0);
  const allItem = `<div class="ep-item ${currentEpIdx===-1?'active':''}" onclick="selectEpisode(-1)">
      전체 (All)
      <span class="ep-count">${totalSents}문장</span>
    </div>`;
  list.innerHTML = allItem + eps.map((ep, i) => `
    <div class="ep-item ${i===currentEpIdx?'active':''}" onclick="selectEpisode(${i})">
      ${ep.title}
      <span class="ep-count">${ep.sentences.length}문장</span>
    </div>
  `).join('');
}

function selectEpisode(idx) {
  currentEpIdx = idx;
  if (idx === -1) {
    document.querySelector('.episode-badge').textContent = `📚 전체 (All) ▾`;
  } else {
    const ep = currentEpisodes()[idx];
    if (!ep) { console.error('[빨모쌤] episode[' + idx + '] 없음'); return; }
    document.querySelector('.episode-badge').textContent = `📚 ${ep.title} ▾`;
  }
  renderEpisodeList();
  toggleEpisodeSelector(true);
  initFlashcards();
  startQuiz();
  initFill();
  initConv();
}

function toggleEpisodeSelector(forceClose) {
  const el = document.getElementById('episodeSelector');
  if (forceClose === true) { el.classList.remove('active'); return; }
  el.classList.toggle('active');
}
function closeEpisodeSelector(e) {
  if (e.target.id === 'episodeSelector') toggleEpisodeSelector(true);
}

function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ============================================================
//  FLASHCARD
// ============================================================
function initFlashcards() {
  fcCards = [...getCurrentSentences()];
  fcIdx = 0;
  fcFlipped = false;
  renderFC();
}

function shuffleFlashcards() {
  fcCards = [...fcCards].sort(() => Math.random() - 0.5);
  fcIdx = 0;
  fcFlipped = false;
  renderFC();
  showToast('🔀 카드를 섞었습니다!');
}

function renderFC() {
  if (!fcCards.length) return;
  const card = fcCards[fcIdx];
  document.getElementById('fcCounter').textContent = `${fcIdx + 1} / ${fcCards.length}`;
  document.getElementById('fcProgress').style.width = `${((fcIdx + 1) / fcCards.length) * 100}%`;
  document.getElementById('fcKorean').textContent = card.korean;
  document.getElementById('fcEnglish').textContent = card.english;
  const vocabHtml = card.vocab.map(v => {
    const parts = v.split(':');
    return `<span>${parts[0]}</span>${parts[1] ? ': ' + parts[1] : ''}`;
  }).join('<br>');
  document.getElementById('fcVocab').innerHTML = vocabHtml;
  document.getElementById('fcVocabFront').innerHTML = vocabHtml;

  const scene = document.getElementById('cardScene');
  scene.classList.remove('flipped');
  fcFlipped = false;
  document.getElementById('fcControls').style.visibility = 'hidden';
}

function flipCard() {
  const scene = document.getElementById('cardScene');
  fcFlipped = !fcFlipped;
  scene.classList.toggle('flipped', fcFlipped);
  if (fcFlipped) {
    document.getElementById('fcControls').style.visibility = 'visible';
    // 자동재생
    if (autoPlayEnabled && fcCards.length) {
      setTimeout(() => playCardAudio(), 300);
    }
  } else {
    document.getElementById('fcControls').style.visibility = 'hidden';
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    const btn = document.getElementById('fcAudioBtn');
    if (btn) { btn.classList.remove('playing'); btn.textContent = '🔊 듣기'; }
  }
}

function fcFeedback(knew) {
  if (knew) {
    fcCards.splice(fcIdx, 1);
    if (fcCards.length === 0) {
      showToast('🎉 모든 카드를 완료했습니다!');
      initFlashcards();
      return;
    }
    if (fcIdx >= fcCards.length) fcIdx = 0;
  } else {
    fcIdx = (fcIdx + 1) % fcCards.length;
  }
  fcFlipped = false;
  renderFC();
}

function fcNext() {
  fcIdx = (fcIdx + 1) % fcCards.length;
  fcFlipped = false;
  renderFC();
}

function fcPrev() {
  fcIdx = (fcIdx - 1 + fcCards.length) % fcCards.length;
  fcFlipped = false;
  renderFC();
}

// ============================================================
//  QUIZ
// ============================================================
function startQuiz() {
  const sents = getCurrentSentences();
  quizItems = [...sents].sort(() => Math.random() - 0.5).slice(0, Math.min(10, sents.length));
  quizIdx = 0;
  quizScore = 0;
  quizAnswered = false;
  document.getElementById('quizScore').textContent = quizScore;
  document.getElementById('quizTotal').textContent = quizItems.length;
  renderQuiz();
}

function renderQuiz() {
  if (!quizItems.length) return;
  if (quizIdx >= quizItems.length) {
    showQuizResult();
    return;
  }
  const item = quizItems[quizIdx];
  quizAnswered = false;

  // Make 4 options: 1 correct + 3 wrong
  const allSents = getCurrentSentences().filter(s => s.english !== item.english);
  const wrongs = allSents.sort(() => Math.random() - 0.5).slice(0, 3).map(s => s.english);
  const options = [...wrongs, item.english].sort(() => Math.random() - 0.5);

  document.getElementById('quizCard').innerHTML = `
    <div class="quiz-q-label">Q ${quizIdx + 1} / ${quizItems.length} — 올바른 영어 표현을 고르세요</div>
    <div class="quiz-question">${item.korean}</div>
    <div class="quiz-options">
      ${options.map((opt, i) => `
        <button class="quiz-opt" onclick="checkQuiz(this,'${escQ(opt)}','${escQ(item.english)}','${item.audioId||''}')">${opt}</button>
      `).join('')}
    </div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <div style="text-align:right; margin-top:4px;">
      <button class="ctrl-btn" onclick="nextQuiz()" id="quizNextBtn" style="display:none">다음 →</button>
    </div>
  `;
}

function escQ(str) { return str.replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

function checkQuiz(btn, chosen, correct, audioIdx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => { o.disabled = true; });

  const fb = document.getElementById('quizFeedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    document.getElementById('quizScore').textContent = quizScore;
    fb.className = 'quiz-feedback correct-fb show';
    fb.innerHTML = '✅ 정답입니다! 잘 하셨어요 👍';
  } else {
    btn.classList.add('wrong');
    opts.forEach(o => { if (o.textContent.trim() === correct) o.classList.add('correct'); });
    fb.className = 'quiz-feedback wrong-fb show';
    fb.innerHTML = `❌ 틀렸습니다. 정답: <strong>${correct}</strong>`;
  }

  const item = quizItems[quizIdx];
  if (item.vocab.length) {
    fb.innerHTML += `<br><br>📝 <b>어휘</b><br>${item.vocab.map(v=>`<span style="color:var(--accent2)">${v}</span>`).join('<br>')}`;
  }
  // 오디오 버튼 추가 + 자동재생
  if (audioIdx) {
    fb.innerHTML += `<br><button class="audio-btn" id="quizAudioBtn" style="margin-top:8px" onclick="playAudio('${audioIdx||''}', this)">🔊 정답 듣기</button>`;
    if (autoPlayEnabled) setTimeout(() => playAudio(audioIdx, document.getElementById('quizAudioBtn')), 400);
  }
  document.getElementById('quizNextBtn').style.display = 'inline-block';
}

function nextQuiz() {
  quizIdx++;
  if (quizIdx >= quizItems.length) showQuizResult();
  else renderQuiz();
}

function showQuizResult() {
  const pct = Math.round((quizScore / quizItems.length) * 100);
  const msg = pct >= 80 ? '🎉 훌륭해요!' : pct >= 60 ? '👍 잘 하셨어요!' : '💪 더 연습해봐요!';
  document.getElementById('quizCard').innerHTML = `
    <div style="text-align:center; padding: 30px 0;">
      <div style="font-size:48px; margin-bottom:16px">${msg.split(' ')[0]}</div>
      <div style="font-size:28px; font-weight:700; color:var(--accent); margin-bottom:8px">${quizScore} / ${quizItems.length}</div>
      <div style="font-size:15px; color:var(--text-muted); margin-bottom:24px">${msg.split(' ').slice(1).join(' ')} 정확도 ${pct}%</div>
      <button class="ctrl-btn primary" onclick="startQuiz()">🎲 다시 풀기</button>
    </div>
  `;
}

// ============================================================
//  FILL IN THE BLANK
// ============================================================
function initFill() {
  fillItems = [...getCurrentSentences()].sort(() => Math.random() - 0.5);
  fillIdx = 0;
  renderFill();
}

function renderFill() {
  if (!fillItems.length) return;
  const item = fillItems[fillIdx % fillItems.length];

  // Find key phrase from vocab or pick a meaningful chunk
  let blank = '';
  let display = item.english;

  if (item.vocab.length) {
    const firstVocab = item.vocab[0];
    const vterm = firstVocab.split(':')[0].trim();
    // Try to find it case-insensitively
    const re = new RegExp(vterm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'i');
    if (re.test(item.english)) {
      blank = item.english.match(re)[0];
      display = item.english.replace(re, '___________');
    }
  }

  if (!blank) {
    // Fallback: blank out last word(s)
    const words = item.english.split(' ');
    blank = words.slice(-2).join(' ');
    display = words.slice(0, -2).join(' ') + ' ___________';
  }

  const hint = item.vocab.length ? item.vocab[0] : '';

  document.getElementById('fillCard').innerHTML = `
    <div class="quiz-q-label">${fillIdx + 1} / ${fillItems.length} — 빈칸을 채워주세요</div>
    <div style="font-size:14px;color:var(--text-muted);margin:8px 0 4px;">🇰🇷 ${item.korean}</div>
    <div class="fill-sentence">${display}</div>
    ${hint ? `<div class="fill-hint">힌트: <em>${hint}</em></div>` : ''}
    <div class="fill-input-row">
      <input class="fill-input" id="fillInput" type="text" placeholder="빈칸을 채워주세요" onkeydown="if(event.key==='Enter')checkFill('${escQ(blank)}','${item.audioId||''}')">
      <button class="ctrl-btn primary" onclick="checkFill('${escQ(blank)}','${item.audioId||''}')">확인</button>
    </div>
    <div class="fill-feedback" id="fillFeedback"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="ctrl-btn" onclick="initFill()">🔀 섞기</button>
      <button class="ctrl-btn" onclick="fillIdx++;renderFill()">다음 →</button>
    </div>
  `;
  setTimeout(() => document.getElementById('fillInput')?.focus(), 100);
}

function checkFill(correct, audioIdx) {
  const input = document.getElementById('fillInput');
  const val = input?.value?.trim();
  if (!val) return;
  const fb = document.getElementById('fillFeedback');
  const norm = s => s.toLowerCase().replace(/[.,!?]/g,'').trim();

  if (norm(val) === norm(correct)) {
    input.classList.add('correct-input');
    fb.className = 'fill-feedback ok show';
    fb.innerHTML = '✅ 정답입니다! 훌륭해요 🎉';
    if (audioIdx) {
      fb.innerHTML += ` <button class="audio-btn" id="fillAudioBtn" style="margin-top:8px" onclick="playAudio('${audioIdx||''}',this)">🔊 듣기</button>`;
      if (autoPlayEnabled) setTimeout(() => playAudio(audioIdx, document.getElementById('fillAudioBtn')), 400);
    }
    setTimeout(() => { fillIdx++; renderFill(); }, 1800);
  } else {
    input.classList.add('wrong-input');
    fb.className = 'fill-feedback ng show';
    fb.innerHTML = `❌ 정답: <span class="correct-ans">${correct}</span>`;
    if (audioIdx) {
      fb.innerHTML += ` <button class="audio-btn" id="fillAudioBtn" style="margin-top:8px" onclick="playAudio('${audioIdx||''}',this)">🔊 정답 듣기</button>`;
    }
  }
}

// ============================================================
//  CONVERSATION
// ============================================================
function initConv() {
  convHistory = [];
  document.getElementById('convMessages').innerHTML = '';

  let sysMsg;
  if (currentEpIdx === -1) {
    const allSents = getCurrentSentences();
    document.getElementById('convSituation').innerHTML = `
      <div class="conv-icon">💬</div>
      <div class="conv-situation-text">
        <strong>전체 에피소드 (All)</strong>
        배운 모든 표현을 활용해 AI와 자유롭게 영어 대화를 연습해보세요.
      </div>
    `;
    sysMsg = `You are a friendly English conversation partner helping a Korean learner practice English.
The learner has studied these expressions: ${allSents.slice(0, 15).map(s => `"${s.english}" (${s.korean})`).join('; ')}

Rules:
1. Start the conversation naturally in English with a relatable everyday scenario.
2. After the user speaks, respond naturally and briefly comment on their English.
3. Naturally weave in the studied expressions when relevant.
4. Keep messages short and conversational.
5. Add a Korean translation for your English in parentheses on a new line when needed.

Start now with a greeting and set up a scenario.`;
  } else {
    const ep = currentEpisodes()[currentEpIdx];
    document.getElementById('convSituation').innerHTML = `
      <div class="conv-icon">💬</div>
      <div class="conv-situation-text">
        <strong>현재 에피소드: ${ep.title}</strong>
        AI와 이 표현을 활용한 영어 대화를 연습해보세요. 여러분의 영어를 코멘트해드립니다.
      </div>
    `;
    sysMsg = `You are a friendly English conversation partner helping a Korean learner practice English.
The current episode is about: "${ep.title}"
Key expressions to practice: ${ep.sentences.map(s => `"${s.english}" (${s.korean})`).join('; ')}

Rules:
1. Start the conversation naturally in English, setting a relatable everyday scenario where the episode's key expression would come up naturally.
2. After the user speaks, respond naturally and briefly comment on their English - praise what's good, gently suggest improvements if needed.
3. Naturally weave in the episode's key expressions.
4. Keep messages short and conversational.
5. Add a Korean translation for your English in parentheses on a new line when needed.
6. If they use the target expression correctly, praise it specifically.

Start now with a greeting and set up a scenario.`;
  }

  convHistory = [{ role: 'system', content: sysMsg }];

  // Add suggestions
  document.getElementById('convSuggestions').innerHTML = `
    <span style="font-size:12px;color:var(--text-dim);align-self:center;">추천:</span>
    <button class="sugg-btn" onclick="useSuggestion('Let\\'s start!')">Let's start!</button>
    <button class="sugg-btn" onclick="useSuggestion('Can you help me practice?')">Can you help me practice?</button>
    <button class="sugg-btn" onclick="startConv()">AI가 먼저 시작</button>
  `;
}

function useSuggestion(text) {
  document.getElementById('convInput').value = text;
  sendMessage();
}

async function startConv() {
  document.getElementById('convSuggestions').innerHTML = '';
  const apiKey = getApiKey();
  if (!apiKey) {
    showTyping(false);
    showApiKeyRow();
    showToast('⚠️ API 키를 먼저 입력해주세요');
    return;
  }

  showTyping(true);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: convHistory[0].content,
        messages: [{ role: 'user', content: 'Please start the conversation!' }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    showTyping(false);
    addMessage('ai', text);
    convHistory.push({ role: 'user', content: 'Please start the conversation!' });
    convHistory.push({ role: 'assistant', content: text });
  } catch(e) {
    showTyping(false);
    if (e.message?.includes('auth') || e.message?.includes('API key')) {
      localStorage.removeItem('anthropic_api_key');
      showApiKeyRow();
      showToast('⚠️ API 키가 올바르지 않습니다. 다시 입력해주세요');
    } else {
      addMessage('ai', 'Hello! Let\'s practice English together. How are you today?\n(안녕하세요! 같이 영어 연습해봐요. 오늘 어떠세요?)');
    }
  }
}

// ============================================================
//  CONVERSATION 음성 입력
// ============================================================
let convRecognition = null;
let convListening = false;

function toggleConvMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('⚠️ 이 브라우저는 음성 인식을 지원하지 않습니다');
    return;
  }
  if (convListening) {
    stopConvMic();
    return;
  }
  startConvMic(SpeechRecognition);
}

function startConvMic(SpeechRecognition) {
  convRecognition = new SpeechRecognition();
  convRecognition.lang = 'en-US';
  convRecognition.continuous = false;
  convRecognition.interimResults = true;

  const btn = document.getElementById('convMicBtn');
  const input = document.getElementById('convInput');

  convListening = true;
  btn.classList.add('listening');
  btn.textContent = '⏹';
  input.placeholder = '듣는 중...';

  convRecognition.onresult = (e) => {
    const transcript = e.results[e.results.length - 1][0].transcript;
    input.value = transcript;
    if (e.results[e.results.length - 1].isFinal) {
      stopConvMic();
      // 최종 인식 완료 시 자동 전송
      if (transcript.trim()) sendMessage();
    }
  };

  convRecognition.onerror = (e) => {
    if (e.error !== 'aborted') showToast('⚠️ 음성 인식 오류: ' + e.error);
    stopConvMic();
  };

  convRecognition.onend = () => stopConvMic();

  try { convRecognition.start(); }
  catch(e) { stopConvMic(); }
}

function stopConvMic() {
  convListening = false;
  const btn = document.getElementById('convMicBtn');
  const input = document.getElementById('convInput');
  if (btn) { btn.classList.remove('listening'); btn.textContent = '🎤'; }
  if (input) input.placeholder = '영어로 말하거나 입력하세요...';
  try { convRecognition?.stop(); } catch(e) {}
  convRecognition = null;
}

async function sendMessage() {
  const input = document.getElementById('convInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  document.getElementById('convSuggestions').innerHTML = '';
  addMessage('user', text);
  document.getElementById('sendBtn').disabled = true;
  showTyping(true);

  const apiKey = getApiKey();
  if (!apiKey) {
    showTyping(false);
    document.getElementById('sendBtn').disabled = false;
    showApiKeyRow();
    showToast('⚠️ API 키를 먼저 입력해주세요');
    return;
  }

  convHistory.push({ role: 'user', content: text });

  try {
    const messages = convHistory.filter(m => m.role !== 'system');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: convHistory[0].content,
        messages: messages
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.find(b => b.type === 'text')?.text || 'Sorry, try again!';
    convHistory.push({ role: 'assistant', content: reply });
    showTyping(false);
    addMessage('ai', reply);
  } catch(e) {
    showTyping(false);
    if (e.message?.includes('auth') || e.message?.includes('API key')) {
      localStorage.removeItem('anthropic_api_key');
      showApiKeyRow();
      showToast('⚠️ API 키가 올바르지 않습니다. 다시 입력해주세요');
    } else {
      addMessage('ai', 'Connection error. Please try again. (연결 오류입니다. 다시 시도해주세요.)');
    }
  }
  document.getElementById('sendBtn').disabled = false;
}

function addMessage(role, text) {
  const msgs = document.getElementById('convMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'ai' ? '🤖' : '👤';
  // Split Korean translations (in parentheses on new lines)
  const formatted = text.replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${formatted}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(show) {
  document.getElementById('typingIndicator').classList.toggle('show', show);
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
//  BOOT
// ============================================================
init();
</script>
<div class="copy-toast" id="copyToast">복사되었습니다</div>
</body>
